name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up JAVA 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Download Gradle 8.4
      run: wget -q https://services.gradle.org/distributions/gradle-8.4-bin.zip -O /tmp/gradle.zip

    - name: Extract Gradle
      run: unzip -q /tmp/gradle.zip -d /opt/

    - name: Add Gradle to PATH
      run: echo "/opt/gradle-8.4/bin" >> $GITHUB_PATH

    - name: Build Debug APK
      run: gradle assembleDebug --no-daemon

    - name: Upload APK
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: Output-APK
        path: app/build/outputs/apk/debug/*.apk
